<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Volt-X | Painel</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="painel-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">⚡ VOLT-X</div>
    <nav class="sidebar-menu" id="sidebarMenu"></nav>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-user" id="topUser"></span>
      </div>
      <div class="topbar-right">
        <div class="creditos-pill" id="topCreditos" style="display:none"></div>
        <button class="btn-sair" onclick="sair()">⏻ Sair</button>
      </div>
    </div>

    <!-- PÁGINAS -->
    <div id="pageGerarKey"></div>
    <div id="pageMinhasKeys"></div>
    <div id="pageRevendedores"></div>
    <div id="pageAdminKeys"></div>
    <div id="pageRanking"></div>
  </main>
</div>

<script src="painel.js"></script>
</body>
</html>
